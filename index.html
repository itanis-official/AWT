<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Météo Live Dashboard</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  background: #08142f;
  color: white;
  padding: 20px;
  overflow-x: hidden;
}

/* animation background */
body::before {
  content: "";
  position: fixed;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle at 20% 20%, rgba(255,255,255,0.08), transparent 40%),
              radial-gradient(circle at 80% 30%, rgba(255,255,255,0.05), transparent 40%);
  animation: moveBg 20s linear infinite;
  z-index: -1;
}

@keyframes moveBg {
  0% { transform: translate(0,0); }
  50% { transform: translate(-5%, -5%); }
  100% { transform: translate(0,0); }
}

/* 🔥 FULL WIDTH */
.container {
  width: 100%;
  max-width: 100%; /* supprimé blocage */
  margin: 0;
  display: flex;
  flex-direction: column;
  gap: 25px;
}

/* TODAY */
.today {
  width: 100%;
  background: linear-gradient(#135deg, #102a54, #08142f);
  border-radius: 25px;
  padding: 30px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.5);
  animation: fadeIn 1s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.location {
  font-size: 22px;
  font-weight: 600;
}

.date {
  font-size: 13px;
  opacity: 0.7;
}

.main {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 25px;
}

.temp {
  font-size: 80px;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.05); }
  100% { transform: scale(1); }
}

.icon {
  font-size: 80px;
  animation: float 3s infinite;
}

@keyframes float {
  0% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
  100% { transform: translateY(0); }
}

.desc {
  opacity: 0.8;
}

.details {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 15px;
  margin-top: 25px;
}

.box {
  background: rgba(255,255,255,0.06);
  padding: 18px;
  border-radius: 15px;
  text-align: center;
  transition: 0.3s;
}

.box:hover {
  transform: translateY(-5px);
  background: rgba(255,255,255,0.12);
}

/* FORECAST FULL WIDTH */
.forecast {
  width: 100%;
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 18px;
}

.day {
  background: #102a54;
  padding: 25px;
  border-radius: 18px;
  text-align: center;
  min-height: 150px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 10px;
  transition: 0.3s;
}

.day:hover {
  transform: translateY(-10px);
  background: #2f5085b9;
}

.day div {
  font-size: 32px !important;
}

@media(max-width: 900px){
  .details { grid-template-columns: repeat(2, 1fr); }
  .forecast { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>

<body>

<div class="container">

  <div class="today">
    <div>
      <div class="location" id="city">Chargement...</div>
      <div class="date" id="date"></div>
    </div>

    <div class="main">
      <div>
        <div class="temp" id="temp">--°</div>
        <div class="desc" id="desc">...</div>
      </div>
      <div class="icon" id="icon">⛅</div>
    </div>

    <div class="details">
      <div class="box"><h4>Ressenti</h4><p id="feels">--</p></div>
      <div class="box"><h4>Humidité</h4><p id="humidity">--</p></div>
      <div class="box"><h4>Vent</h4><p id="wind">--</p></div>
      <div class="box"><h4>Pression</h4><p id="pressure">--</p></div>
    </div>
  </div>

  <div class="forecast" id="forecast"></div>

</div>

<script>
const API_KEY = "064f40f27a68541ca0db452cd3194820";

document.getElementById("date").innerText =
new Date().toLocaleString("fr-FR", {
  weekday: "short",
  day: "2-digit",
  month: "short",
  hour: "2-digit",
  minute: "2-digit"
});

function getIcon(main){
  switch(main){
    case "Clear": return "☀️";
    case "Clouds": return "⛅";
    case "Rain": return "🌧️";
    case "Thunderstorm": return "🌩️";
    default: return "🌤️";
  }
}

function getWeather(lat, lon){
fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&units=metric&lang=fr&appid=${API_KEY}`)
.then(res => res.json())
.then(data => {
  document.getElementById("city").innerText = data.name + ", " + data.sys.country;
  document.getElementById("temp").innerText = Math.round(data.main.temp) + "°";
  document.getElementById("desc").innerText = data.weather[0].description;
  document.getElementById("icon").innerText = getIcon(data.weather[0].main);

  document.getElementById("feels").innerText = Math.round(data.main.feels_like) + "°";
  document.getElementById("humidity").innerText = data.main.humidity + "%";
  document.getElementById("wind").innerText = data.wind.speed + " km/h";
  document.getElementById("pressure").innerText = data.main.pressure + " hPa";
});
}

function getForecast(lat, lon){
fetch(`https://api.openweathermap.org/data/2.5/forecast?lat=${lat}&lon=${lon}&units=metric&lang=fr&appid=${API_KEY}`)
.then(res => res.json())
.then(data => {
  const container = document.getElementById("forecast");
  container.innerHTML = "";

  const daily = data.list.filter((item, index) => index % 8 === 0);

  daily.slice(0,5).forEach(d => {
    const date = new Date(d.dt_txt);
    container.innerHTML += `
      <div class="day">
        <h4>${date.toLocaleDateString("fr-FR",{weekday:"short"})}</h4>
        <div>${getIcon(d.weather[0].main)}</div>
        <p>${Math.round(d.main.temp)}°</p>
      </div>
    `;
  });
});
}

navigator.geolocation.getCurrentPosition(pos => {
  getWeather(pos.coords.latitude, pos.coords.longitude);
  getForecast(pos.coords.latitude, pos.coords.longitude);
}, () => {
  getWeather(36.8065, 10.1815);
  getForecast(36.8065, 10.1815);
});
</script>

</body>
</html>
